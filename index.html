<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Android Tweaks by DCX</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #1e2a2f;
      color: #e6f1f1;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    header {
      text-align: center;
      padding: 30px 15px;
    }
    header h1 {
      margin: 0;
      font-size: 1.5rem;
      color: #a8ffdc;
    }
    .projects {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      padding: 20px;
      max-width: 900px;
      margin: auto;
      flex: 1;
    }
    .card {
      background: #27393f;
      border-radius: 16px;
      padding: 20px;
      text-align: center;
      box-shadow: 0 0 12px rgba(0,0,0,0.3);
      transition: transform 0.2s ease;
    }
    .card:hover {
      transform: translateY(-5px);
    }
    .card h2 {
      margin-top: 0;
      color: #72f1b8;
    }
    .btn {
      display: inline-block;
      margin-top: 12px;
      padding: 10px 20px;
      background: #2e9d85;
      color: white;
      border-radius: 8px;
      text-decoration: none;
      transition: background 0.2s ease;
    }
    .btn:hover {
      background: #46c5a3;
    }
    footer {
      text-align: center;
      padding: 20px;
      background: #162123;
    }
    footer h2 {
      margin-bottom: 10px;
      color: #72f1b8;
    }
  </style>
</head>

    </div>
